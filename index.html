<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Safe-Spark | Akademik Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <style>
        body { background: #050505; color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 20px; }
        .box { background: #111; border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; }
        button { padding: 10px 20px; background: #38bdf8; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #auth-sec, #main-sec { display: none; }
    </style>
</head>
<body>

<div id="auth-sec" style="display:block; max-width: 400px; margin: auto;">
    <h2>Giriş / Kayıt</h2>
    <input type="email" id="email" placeholder="E-posta">
    <input type="password" id="pass" placeholder="Şifre">
    <button onclick="register()">Kayıt Ol</button>
    <button onclick="login()">Giriş Yap</button>
</div>

<div id="main-sec" class="box">
    <h2>Baş Yapıt: EQFT Teorisi</h2>
    <iframe src="teori.pdf" width="100%" height="600px"></iframe>
    <br><br>
    <button onclick="logout()">Çıkış Yap</button>
</div>

<script>
    const { Client, Account } = Appwrite;
    const client = new Client()
        .setEndpoint('https://cloud.appwrite.io/v1')
        .setProject('BURAYA_PROJECT_ID_YAZ'); // Project ID'ni buraya yapıştır

    const account = new Account(client);

    async function register() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        await account.create(Appwrite.ID.unique(), email, pass);
        alert("Kayıt oldun, şimdi giriş yap!");
    }

    async function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        await account.createEmailPasswordSession(email, pass);
        location.reload();
    }

    async function logout() {
        await account.deleteSession('current');
        location.reload();
    }

    // Sayfa açılınca girişli mi değil mi kontrol et
    account.get().then(() => {
        document.getElementById('auth-sec').style.display = 'none';
        document.getElementById('main-sec').style.display = 'block';
    }).catch(() => {
        document.getElementById('auth-sec').style.display = 'block';
    });
</script>
</body>
</html>
