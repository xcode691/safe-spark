<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Safe-Spark | Akademik Portal</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0b0f19; --card: #111827; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Segoe UI', sans-serif; margin: 0; }
        nav { background: #111827; padding: 15px 30px; display: flex; justify-content: space-between; border-bottom: 1px solid #1f2937; position: sticky; top: 0; }
        .container { max-width: 900px; margin: 30px auto; padding: 20px; }
        .card { background: var(--card); border: 1px solid #1f2937; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .page { display: none; } .page.active { display: block; }
        .btn { padding: 10px 20px; background: linear-gradient(to right, #38bdf8, #2563eb); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #1f2937; border: 1px solid #374151; color: white; margin: 10px 0; border-radius: 6px; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 800; color: var(--primary); cursor: pointer;" onclick="switchPage('home')">💥 SAFE-SPARK</div>
    <div>
        <button onclick="switchPage('home')">Keşfet</button>
        <button onclick="switchPage('publish')">Yayınla</button>
        <button onclick="switchPage('profile')">Profil</button>
        <button id="authBtn" onclick="switchPage('auth')">Giriş/Kayıt</button>
    </div>
</nav>

<div class="container">
    <div id="page-home" class="page active">
        <h2>Sabit Kurucu Yayını</h2>
        <div class="card">
            <h4>Evrimsel Kuantum Doku Teorisi (EQFT)</h4>
            <iframe src="teori.pdf" width="100%" height="400px"></iframe>
        </div>
        <h3>Topluluk Makaleleri</h3>
        <div id="feed"></div>
    </div>

    <div id="page-publish" class="page">
        <div class="card">
            <h2>Makale Yayınla</h2>
            <input type="text" id="pubTitle" placeholder="Başlık">
            <input type="file" id="pdfInput" accept="application/pdf">
            <button class="btn" onclick="handlePublish()">Yayınla</button>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="card">
            <h2>Profilini Özelleştir</h2>
            <input type="text" id="userName" placeholder="Ad Soyad / Ünvan">
            <button class="btn" onclick="updateProfile()">Kaydet</button>
            <p id="profileStatus"></p>
        </div>
    </div>

    <div id="page-auth" class="page">
        <div class="card">
            <h2 id="authTitle">Giriş Yap</h2>
            <input type="email" id="email" placeholder="E-posta">
            <input type="password" id="pass" placeholder="Şifre">
            <button class="btn" onclick="handleAuth()">İşlemi Tamamla</button>
        </div>
    </div>
</div>

<script>
    function switchPage(p) {
        document.querySelectorAll('.page').forEach(e => e.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
    }

    // Makale Yükleme
    async function handlePublish() {
        const file = document.getElementById('pdfInput').files[0];
        const title = document.getElementById('pubTitle').value;
        const reader = new FileReader();
        reader.onload = (e) => {
            let papers = JSON.parse(localStorage.getItem('papers') || '[]');
            papers.push({ title, data: e.target.result });
            localStorage.setItem('papers', JSON.stringify(papers));
            loadFeed();
            switchPage('home');
        };
        reader.readAsDataURL(file);
    }

    function loadFeed() {
        const feed = document.getElementById('feed');
        const papers = JSON.parse(localStorage.getItem('papers') || '[]');
        feed.innerHTML = papers.map(p => `
            <div class="card">
                <h4>${p.title}</h4>
                <iframe src="${p.data}" width="100%" height="300px"></iframe>
            </div>
        `).join('');
    }

    // Profil Güncelleme
    function updateProfile() {
        const name = document.getElementById('userName').value;
        localStorage.setItem('userProfile', name);
        document.getElementById('profileStatus').innerText = "Profil güncellendi!";
    }

    // Basit Auth Mock
    function handleAuth() {
        localStorage.setItem('isLoggedIn', 'true');
        document.getElementById('authBtn').innerText = "Çıkış Yap";
        alert("Giriş yapıldı!");
    }

    window.onload = loadFeed;
</script>
</body>
</html>
