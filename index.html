<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Safe-Spark | Güvenli Akademik Portal</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0b0f19; --card: #111827; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Segoe UI', sans-serif; margin: 0; }
        nav { background: #111827; padding: 15px 30px; display: flex; justify-content: space-between; border-bottom: 1px solid #1f2937; }
        .container { max-width: 900px; margin: 30px auto; padding: 20px; }
        .card { background: var(--card); border: 1px solid #1f2937; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .page { display: none; } .page.active { display: block; }
        .btn { padding: 10px 20px; background: linear-gradient(to right, #38bdf8, #2563eb); color: white; border: none; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; }
        input { width: 100%; padding: 12px; background: #1f2937; border: 1px solid #374151; color: white; margin: 10px 0; border-radius: 6px; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 800; color: var(--primary); cursor: pointer;" onclick="switchPage('home')">💥 SAFE-SPARK</div>
    <div>
        <button onclick="switchPage('home')">Keşfet</button>
        <button id="navAuth" onclick="switchPage('auth')">Giriş/Kayıt</button>
    </div>
</nav>

<div class="container">
    <div id="page-home" class="page active">
        <h2>Sabit Kurucu Yayını</h2>
        <div class="card">
            <h4>Evrimsel Kuantum Doku Teorisi (EQFT)</h4>
            <iframe src="teori.pdf" width="100%" height="400px"></iframe>
        </div>
    </div>

    <div id="page-auth" class="page">
        <div class="card">
            <h2 id="authModeTitle">Giriş Yap</h2>
            <input type="email" id="email" placeholder="E-posta adresi">
            <input type="password" id="pass" placeholder="Şifre">
            <button class="btn" onclick="processAuth()">Tamamla</button>
            <p style="text-align: center; cursor: pointer; margin-top: 15px; color: var(--primary);" 
               onclick="toggleMode()" id="toggleText">Hesabın yok mu? Kayıt Ol</p>
        </div>
    </div>
</div>

<script>
    let isLoginMode = true;

    function switchPage(p) {
        document.querySelectorAll('.page').forEach(e => e.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
    }

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('authModeTitle').innerText = isLoginMode ? "Giriş Yap" : "Kayıt Ol";
        document.getElementById('toggleText').innerText = isLoginMode ? "Hesabın yok mu? Kayıt Ol" : "Zaten hesabın var mı? Giriş Yap";
    }

    // SHA-256 Şifreleme (Güvenlik için)
    async function sha256(message) {
        const msgUint8 = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function processAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const hash = await sha256(pass);

        if (!isLoginMode) {
            // KAYIT OLMA
            if(localStorage.getItem('user_' + email)) {
                alert("Bu e-posta zaten kayıtlı!");
            } else {
                localStorage.setItem('user_' + email, hash);
                alert("Kayıt başarılı! Şimdi giriş yapabilirsiniz.");
                toggleMode();
            }
        } else {
            // GİRİŞ YAPMA
            const savedHash = localStorage.getItem('user_' + email);
            if(savedHash && savedHash === hash) {
                alert("Giriş Başarılı!");
                document.getElementById('navAuth').innerText = "Profil";
                switchPage('home');
            } else {
                alert("Hatalı e-posta veya yanlış şifre!");
            }
        }
    }
</script>
</body>
</html>
