<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Safe-Spark | Akademik Yayın Platformu</title>
    <style>
        body { background: #0b0f19; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; margin: 0; }
        nav { background: #111827; padding: 15px 30px; display: flex; justify-content: space-between; border-bottom: 1px solid #1f2937; }
        .container { max-width: 900px; margin: 40px auto; padding: 20px; }
        .card { background: #111827; border: 1px solid #1f2937; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
        input, textarea { width: 100%; padding: 10px; background: #1f2937; border: 1px solid #374151; color: white; margin-top: 5px; }
        .pdf-list { margin-top: 20px; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 800; color: #38bdf8;">💥 SAFE-SPARK PORTAL</div>
    <button onclick="document.getElementById('uploadSection').scrollIntoView()">Makale Yükle</button>
</nav>

<div class="container">
    <div class="card" id="uploadSection">
        <h2>Yeni Makale Yükle (PDF)</h2>
        <input type="text" id="paperTitle" placeholder="Makale Başlığı">
        <input type="file" id="pdfInput" accept="application/pdf" style="margin-top:10px;">
        <button class="btn" style="margin-top:10px;" onclick="handleUpload()">Yükle ve Yayınla</button>
    </div>

    <h3>Küresel Araştırmalar</h3>
    <div id="feed" class="pdf-list"></div>
</div>

<script>
    // Sayfa yüklendiğinde kayıtlı makaleleri getir
    window.onload = loadPapers;

    function handleUpload() {
        const title = document.getElementById('paperTitle').value;
        const fileInput = document.getElementById('pdfInput');
        const file = fileInput.files[0];

        if (!title || !file) return alert("Başlık ve PDF gerekli!");

        const reader = new FileReader();
        reader.onload = function(e) {
            const paper = { title: title, data: e.target.result };
            let papers = JSON.parse(localStorage.getItem('papers') || '[]');
            papers.push(paper);
            localStorage.setItem('papers', JSON.stringify(papers));
            loadPapers();
            alert("Makale başarıyla paylaşıldı!");
        };
        reader.readAsDataURL(file);
    }

    function loadPapers() {
        const feed = document.getElementById('feed');
        const papers = JSON.parse(localStorage.getItem('papers') || '[]');
        feed.innerHTML = papers.map(p => `
            <div class="card">
                <h4>${p.title}</h4>
                <iframe src="${p.data}" width="100%" height="400px"></iframe>
            </div>
        `).join('');
    }
</script>
</body>
</html>
